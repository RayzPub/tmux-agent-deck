<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CCNOW - 登录控制台</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.geekzu.org">
  <link rel="preconnect" href="https://gmirror.geekzu.org" crossorigin>
  <link href="https://fonts.geekzu.org/css2?family=Fira+Code:wght@400;500;700&family=Orbitron:wght@400;600;800;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="/js/lucide.min.js"></script>
  <!-- Style Sheet -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- Favicon / Tab Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
</head>
<body class="cyberpunk-auth-body">
  <script>
    // Initialize Theme immediately to prevent FOUC (Flash of Unstyled Content)
    (function() {
      const savedTheme = localStorage.getItem('theme-style');
      if (savedTheme === 'light-minimalist') {
        document.body.classList.add('light-minimalist');
      }
    })();
  </script>
  <!-- Scanning Line Effect -->
  <div class="scanline"></div>

  <!-- Cyber Background Grid (Animated 3D Grid) -->
  <div class="welcome-grid-container">
    <div class="welcome-grid-3d" id="welcomeGrid3D"></div>
    <div class="welcome-grid-overlay"></div>
  </div>

  <!-- Login Container -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-glow"></div>
      
      <!-- Tech Corners -->
      <div class="tech-corner top-left"></div>
      <div class="tech-corner top-right"></div>
      <div class="tech-corner bottom-left"></div>
      <div class="tech-corner bottom-right"></div>

      <!-- Header -->
      <div class="auth-header">
        <div class="cyber-badge">系统安全保护中</div>
        <h1 class="glitch-text" data-text="CCNOW 登录">CCNOW 登录</h1>
        <p class="auth-subtitle">请输入身份验证密钥以控制系统</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="auth-form">
        <div class="input-group" id="usernameGroup" style="display: none;">
          <label for="username">
            <span class="label-tech-text">// 用户名</span>
          </label>
          <div class="input-wrapper">
            <i data-lucide="user" class="input-icon"></i>
            <input
              type="text"
              id="username"
              placeholder="请输入用户名"
              autocomplete="username"
            >
            <div class="input-indicator"></div>
          </div>
        </div>

        <div class="input-group">
          <label for="password">
            <span class="label-tech-text" id="passwordLabel">// 安全令牌</span>
          </label>
          <div class="input-wrapper">
            <i data-lucide="key-round" class="input-icon"></i>
            <input 
              type="password" 
              id="password" 
              placeholder="••••••••••••••" 
              required 
              autocomplete="current-password"
              autofocus
            >
            <div class="input-indicator"></div>
          </div>
        </div>

        <button type="submit" class="cyber-btn" id="loginBtn">
          <span class="btn-text">进行身份验证</span>
          <span class="btn-glitch"></span>
          <i data-lucide="shield-check" class="btn-icon"></i>
        </button>

        <div class="register-link-container" id="registerLinkContainer" style="margin-top: 15px; text-align: center; display: none;">
          <a href="/register.html" class="tech-link" style="color: #00f0ff; font-family: 'Fira Code', monospace; font-size: 12px; text-decoration: none; text-transform: uppercase;">// 注册新账号</a>
        </div>

        <div class="welcome-link-container" style="margin-top: 15px; text-align: center;">
          <a href="/welcome" class="tech-link" style="color: #ff007f; font-family: 'Fira Code', monospace; font-size: 12px; text-decoration: none; text-transform: uppercase; text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);">// 探索功能特性</a>
        </div>
      </form>

      <!-- Alert -->
      <div id="errorAlert" class="auth-alert hidden">
        <div class="alert-border"></div>
        <i data-lucide="alert-triangle" class="alert-icon"></i>
        <div class="alert-content">
          <span class="alert-title">验证拒绝</span>
          <span class="alert-message">无效的安全密钥</span>
        </div>
      </div>
      

    </div>
  </div>

  <script>
    // Helper: Determine redirect URL.
    // If coming from register page, default to '/welcome'.
    function getRedirectUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      let redirectUrl = urlParams.get('redirect');
      if (!redirectUrl && document.referrer && document.referrer.includes('register.html')) {
        redirectUrl = '/welcome';
      }
      return redirectUrl || '/';
    }

    // Initialize Lucide Icons
    lucide.createIcons();

    // Check if already authenticated, if so, redirect
    fetch('/api/auth-status')
      .then(res => res.json())
      .then(data => {
        console.log('[Login] auth-status:', data);
        if (data.authenticated) {
          window.location.href = getRedirectUrl();
          return;
        }
        if (data.multiUserEnabled) {
          console.log('[Login] Multi-user mode detected, showing username field');
          const usernameGroup = document.getElementById('usernameGroup');
          if (usernameGroup) {
            usernameGroup.style.display = 'flex';
          }
          const usernameInput = document.getElementById('username');
          if (usernameInput) {
            usernameInput.required = true;
          }
          const passwordLabel = document.getElementById('passwordLabel');
          if (passwordLabel) {
            passwordLabel.textContent = '// 密码';
          }
          const registerLink = document.getElementById('registerLinkContainer');
          if (registerLink) {
            registerLink.style.display = 'block';
          }
          // Re-render icons
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }
      })
      .catch(err => {
        console.error('[Login] auth-status error:', err);
      });

    // Handle Form Submit
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorAlert = document.getElementById('errorAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset UI state
      errorAlert.classList.add('hidden');
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      const password = passwordInput.value;
      const username = document.getElementById('username').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success
          loginBtn.querySelector('.btn-text').innerText = '验证成功';
          setTimeout(() => {
            window.location.href = getRedirectUrl();
          }, 800);
        } else {
          // Failed
          throw new Error(data.error || 'Authentication failed');
        }
      } catch (err) {
        console.error(err);
        // Show neon alert
        errorAlert.classList.remove('hidden');
        const alertMsg = errorAlert.querySelector('.alert-message');
        if (alertMsg && err.message) {
          alertMsg.textContent = err.message.toUpperCase();
        }
        passwordInput.value = '';
        passwordInput.focus();
        
        // Add shake animation to the card
        const card = document.querySelector('.auth-card');
        card.classList.add('shake-anim');
        setTimeout(() => {
          card.classList.remove('shake-anim');
        }, 500);
      } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    });



    // Welcome Panel Interactive 3D Parallax Effect
    const welcomeGrid3D = document.getElementById('welcomeGrid3D');
    if (welcomeGrid3D) {
      document.body.addEventListener('mousemove', (e) => {
        if (window.innerWidth <= 768) return;
        
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const centerX = width / 2;
        const centerY = height / 2;
        
        // Calculate tilts (Max +/- 5 degrees on X, Max +/- 6 degrees on Y)
        const tiltX = ((e.clientY - centerY) / centerY) * -5;
        const tiltY = ((e.clientX - centerX) / centerX) * 6;
        
        welcomeGrid3D.style.transform = `rotateX(${30 + tiltX}deg) rotateY(${tiltY}deg) translate3d(0, 0, 0)`;
      });
      
      document.body.addEventListener('mouseleave', () => {
        if (window.innerWidth <= 768) return;
        welcomeGrid3D.style.transform = 'rotateX(30deg) rotateY(0deg) translate3d(0, 0, 0)';
      });
    }
    // Check query params for scan errors
    const urlParams = new URLSearchParams(window.location.search);
    const errorParam = urlParams.get('error');
    if (errorParam && errorAlert) {
      errorAlert.classList.remove('hidden');
      const titleEl = errorAlert.querySelector('.alert-title');
      const messageEl = errorAlert.querySelector('.alert-message');
      if (errorParam === 'scan_expired') {
        if (titleEl) titleEl.textContent = '二维码已失效';
        if (messageEl) messageEl.textContent = '二维码在60秒内有效，已失效。请重新扫码。';
      } else if (errorParam === 'scan_invalid') {
        if (titleEl) titleEl.textContent = '二维码无效';
        if (messageEl) messageEl.textContent = '扫码链接无效或已被使用。';
      }
    }
  </script>
</body>
</html>
