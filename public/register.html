<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CCNOW - 注册新账号</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.geekzu.org">
  <link rel="preconnect" href="https://gmirror.geekzu.org" crossorigin>
  <link href="https://fonts.geekzu.org/css2?family=Fira+Code:wght@400;500;700&family=Orbitron:wght@400;600;800;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="/js/lucide.min.js"></script>
  <!-- Style Sheet -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- Favicon / Tab Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
</head>
<body class="cyberpunk-auth-body">
  <script>
    // Initialize Theme immediately
    (function() {
      const savedTheme = localStorage.getItem('theme-style');
      if (savedTheme === 'light-minimalist') {
        document.body.classList.add('light-minimalist');
      }
    })();
  </script>
  <!-- Scanning Line Effect -->
  <div class="scanline"></div>

  <!-- Cyber Background Grid -->
  <div class="welcome-grid-container">
    <div class="welcome-grid-3d" id="welcomeGrid3D"></div>
    <div class="welcome-grid-overlay"></div>
  </div>

  <!-- Register Container -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-glow"></div>
      
      <!-- Tech Corners -->
      <div class="tech-corner top-left"></div>
      <div class="tech-corner top-right"></div>
      <div class="tech-corner bottom-left"></div>
      <div class="tech-corner bottom-right"></div>

      <!-- Header -->
      <div class="auth-header">
        <div class="cyber-badge">账号注册中心</div>
        <h1 class="glitch-text" data-text="新用户注册">新用户注册</h1>
        <p class="auth-subtitle">请输入邀请码以初始化您的账号</p>
      </div>

      <!-- Form -->
      <form id="registerForm" class="auth-form">
        <div class="input-group">
          <label for="code">
            <span class="label-tech-text">// 注册邀请码</span>
          </label>
          <div class="input-wrapper">
            <i data-lucide="ticket" class="input-icon"></i>
            <input 
              type="text" 
              id="code" 
              placeholder="INV-XXXXXX" 
              required 
              autocomplete="off"
            >
            <div class="input-indicator"></div>
          </div>
        </div>

        <div class="input-group">
          <label for="username">
            <span class="label-tech-text">// 用户名</span>
          </label>
          <div class="input-wrapper">
            <i data-lucide="user" class="input-icon"></i>
            <input 
              type="text" 
              id="username" 
              placeholder="请设置用户名" 
              required 
              autocomplete="username"
            >
            <div class="input-indicator"></div>
          </div>
        </div>

        <div class="input-group">
          <label for="password">
            <span class="label-tech-text">// 密码</span>
          </label>
          <div class="input-wrapper">
            <i data-lucide="key-round" class="input-icon"></i>
            <input 
              type="password" 
              id="password" 
              placeholder="••••••••••••••" 
              required 
              autocomplete="new-password"
            >
            <div class="input-indicator"></div>
          </div>
        </div>

        <button type="submit" class="cyber-btn" id="registerBtn">
          <span class="btn-text">初始化注册账号</span>
          <span class="btn-glitch"></span>
          <i data-lucide="user-plus" class="btn-icon"></i>
        </button>

        <div class="login-link-container" style="margin-top: 15px; text-align: center;">
          <a href="/login.html?redirect=/welcome" class="tech-link" style="color: #ff007f; font-family: 'Fira Code', monospace; font-size: 12px; text-decoration: none; text-transform: uppercase;">// 返回登录页面</a>
        </div>
      </form>

      <!-- Alert -->
      <div id="errorAlert" class="auth-alert hidden">
        <div class="alert-border"></div>
        <i data-lucide="alert-triangle" class="alert-icon"></i>
        <div class="alert-content">
          <span class="alert-title">注册失败</span>
          <span class="alert-message">邀请码无效或已过期</span>
        </div>
      </div>

      <div id="successAlert" class="auth-alert hidden" style="border-color: #00ff66;">
        <div class="alert-border" style="background: #00ff66;"></div>
        <i data-lucide="check-circle" class="alert-icon" style="color: #00ff66;"></i>
        <div class="alert-content">
          <span class="alert-title" style="color: #00ff66;">注册成功</span>
          <span class="alert-message" style="color: #ffffff;">身份创建成功，正在重定向...</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Check if multi-user mode is enabled
    fetch('/api/auth-status')
      .then(res => res.json())
      .then(data => {
        if (!data.multiUserEnabled) {
          // If multi user is not enabled, redirect to login
          window.location.href = '/login.html?redirect=/welcome';
        }
      });

    // Auto-fill invitation code from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const codeParam = urlParams.get('code');
    if (codeParam) {
      document.getElementById('code').value = codeParam;
    }

    // Handle Form Submit
    const form = document.getElementById('registerForm');
    const codeInput = document.getElementById('code');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const registerBtn = document.getElementById('registerBtn');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset UI state
      errorAlert.classList.add('hidden');
      successAlert.classList.add('hidden');
      registerBtn.classList.add('loading');
      registerBtn.disabled = true;

      const code = codeInput.value;
      const username = usernameInput.value;
      const password = passwordInput.value;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code, username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success
          successAlert.classList.remove('hidden');
          registerBtn.querySelector('.btn-text').innerText = '已创建';
          setTimeout(() => {
            window.location.href = '/login.html?redirect=/welcome';
          }, 1500);
        } else {
          // Failed
          throw new Error(data.error || 'Registration failed');
        }
      } catch (err) {
        console.error(err);
        // Show neon alert
        errorAlert.classList.remove('hidden');
        const alertMsg = errorAlert.querySelector('.alert-message');
        if (alertMsg && err.message) {
          alertMsg.textContent = err.message.toUpperCase();
        }
        
        // Add shake animation to the card
        const card = document.querySelector('.auth-card');
        card.classList.add('shake-anim');
        setTimeout(() => {
          card.classList.remove('shake-anim');
        }, 500);
      } finally {
        registerBtn.classList.remove('loading');
        registerBtn.disabled = false;
      }
    });

    // Welcome Panel Interactive 3D Parallax Effect
    const welcomeGrid3D = document.getElementById('welcomeGrid3D');
    if (welcomeGrid3D) {
      document.body.addEventListener('mousemove', (e) => {
        if (window.innerWidth <= 768) return;
        
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const centerX = width / 2;
        const centerY = height / 2;
        
        const tiltX = ((e.clientY - centerY) / centerY) * -5;
        const tiltY = ((e.clientX - centerX) / centerX) * 6;
        
        welcomeGrid3D.style.transform = `rotateX(${30 + tiltX}deg) rotateY(${tiltY}deg) translate3d(0, 0, 0)`;
      });
      
      document.body.addEventListener('mouseleave', () => {
        if (window.innerWidth <= 768) return;
        welcomeGrid3D.style.transform = 'rotateX(30deg) rotateY(0deg) translate3d(0, 0, 0)';
      });
    }
  </script>
</body>
</html>
